<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=380" />
  <title>CraftPlan Research</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 460px;
      max-height: 600px;
      overflow-y: auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      font-size: 12px;
      line-height: 1.4;
    }
    #root { min-height: 460px; }
    /* Amber-toned scrollbar to match the new brand palette */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.25); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.45); }
    button:focus-visible, a:focus-visible, input:focus-visible {
      outline: 2px solid rgba(245,158,11,0.5);
      outline-offset: 1px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="dist/index.js"></script>
</body>
</html>
