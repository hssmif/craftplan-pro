<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Rounded amber gradient backdrop -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="48" height="48" rx="11" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Glyph: amber chart bars on a darker plate -->
  <g>
    <rect x="11" y="23" width="5" height="14" rx="1" fill="#0a0a0f" opacity="0.85"/>
      <rect x="18" y="11" width="5" height="26" rx="1" fill="#0a0a0f" opacity="0.85"/>
      <rect x="25" y="18" width="5" height="19" rx="1" fill="#0a0a0f" opacity="0.85"/>
      <rect x="32" y="15" width="5" height="22" rx="1" fill="#0a0a0f" opacity="0.85"/>
    <!-- Pulse dot above the tallest bar -->
    <circle cx="20.5" cy="7" r="2" fill="#0a0a0f" opacity="0.9"/>
    <circle cx="20.5" cy="7" r="1" fill="#fff" opacity="0.85"/>
  </g>
</svg>