<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Rounded amber gradient backdrop -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Glyph: amber chart bars on a darker plate -->
  <g>
    <rect x="28" y="62" width="14" height="38" rx="3" fill="#0a0a0f" opacity="0.85"/>
      <rect x="47" y="30" width="14" height="70" rx="3" fill="#0a0a0f" opacity="0.85"/>
      <rect x="66" y="49" width="14" height="51" rx="3" fill="#0a0a0f" opacity="0.85"/>
      <rect x="85" y="42" width="14" height="58" rx="3" fill="#0a0a0f" opacity="0.85"/>
    <!-- Pulse dot above the tallest bar -->
    <circle cx="54" cy="18" r="6" fill="#0a0a0f" opacity="0.9"/>
    <circle cx="54" cy="18" r="2.7" fill="#fff" opacity="0.85"/>
  </g>
</svg>