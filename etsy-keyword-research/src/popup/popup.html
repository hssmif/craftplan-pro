<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z" fill="white"/>
        </svg>
      </div>
      <span class="header-title">ListingView</span>
    </div>
  </div>

  <!-- Page Info -->
  <div class="section">
    <div class="page-info">
      <span class="page-badge" id="page-badge">&mdash;</span>
      <span class="page-url" id="page-url">Detecting page...</span>
    </div>
  </div>

  <!-- Metric Cards -->
  <div class="section">
    <div class="metric-grid" id="metric-grid">
      <div class="metric-card mc-competition">
        <div class="metric-value" id="m-competition">--</div>
        <div class="metric-label">Competition</div>
      </div>
      <div class="metric-card mc-evergreen">
        <div class="metric-value" id="m-evergreen">0</div>
        <div class="metric-label">Evergreen</div>
      </div>
      <div class="metric-card mc-trending">
        <div class="metric-value" id="m-trending">0</div>
        <div class="metric-label">Trending</div>
      </div>
      <div class="metric-card mc-new">
        <div class="metric-value" id="m-new">0</div>
        <div class="metric-label">New</div>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <button class="btn btn-primary" id="btn-scan">
      <span id="scan-label">Scan This Page</span>
    </button>
    <button class="btn btn-secondary" id="btn-dashboard">Open Dashboard</button>
  </div>

  <!-- Scan Feedback -->
  <div class="scan-feedback hidden" id="scan-feedback">
    <span id="scan-msg"></span>
  </div>

  <!-- Totals -->
  <div class="section totals-section">
    <div class="totals-row">
      <span class="totals-label">Stored Listings</span>
      <span class="totals-value" id="total-listings">0</span>
    </div>
    <div class="totals-row">
      <span class="totals-label">Stored Keywords</span>
      <span class="totals-value" id="total-keywords">0</span>
    </div>
  </div>

  <!-- Etsy API Key (for accurate listing age) -->
  <div class="section" style="border-top:1px solid #e5e7eb;margin-top:8px;padding-top:8px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="font-size:11px;font-weight:600;color:#374151;">Etsy API Key</span>
      <span style="font-size:10px;color:#9ca3af;" title="Required for accurate listing age. Get a free key at etsy.com/developers">(?)</span>
    </div>
    <div style="display:flex;gap:4px;">
      <input type="password" id="api-key-input" placeholder="Enter API key..." style="flex:1;padding:4px 6px;font-size:11px;border:1px solid #d1d5db;border-radius:4px;outline:none;">
      <button class="btn btn-sm btn-outline" id="btn-save-key" style="font-size:10px;padding:3px 8px;">Save</button>
    </div>
    <div id="api-key-status" style="font-size:10px;margin-top:2px;color:#6b7280;"></div>
  </div>

  <!-- CraftPlan Integration -->
  <div class="section" style="border-top:1px solid #e5e7eb;margin-top:8px;padding-top:8px;">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="font-size:11px;font-weight:600;color:#374151;">CraftPlan Digital</span>
      <span id="cp-status-dot" style="width:7px;height:7px;border-radius:50%;background:#d1d5db;display:inline-block;" title="Not connected"></span>
    </div>
    <div style="display:flex;gap:4px;">
      <input type="text" id="cp-url-input" placeholder="http://localhost:3461" style="flex:1;padding:4px 6px;font-size:11px;border:1px solid #d1d5db;border-radius:4px;outline:none;">
      <button class="btn btn-sm btn-outline" id="btn-cp-save" style="font-size:10px;padding:3px 8px;">Save</button>
      <button class="btn btn-sm btn-outline" id="btn-cp-test" style="font-size:10px;padding:3px 8px;">Test</button>
    </div>
    <div id="cp-status" style="font-size:10px;margin-top:2px;color:#6b7280;"></div>
    <button class="btn btn-primary" id="btn-cp-send" style="margin-top:6px;font-size:11px;padding:6px 0;width:100%;">
      🚀 Send All to CraftPlan
    </button>
    <div id="cp-send-status" style="font-size:10px;margin-top:2px;color:#6b7280;"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn btn-sm btn-outline" id="btn-export">Export CSV</button>
    <button class="btn btn-sm btn-danger" id="btn-clear">Clear Data</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
